{% include "partials/stats_select.html" %}

<div id="graph-view" style="margin-top: 1rem;">
    <div id="active-chart" class="chart-container" style="min-height: 450px; width: 100%;"></div>
</div>

<script>
    (function () {
        // Use the variable name 'graph_data' from Python
        const rawData = {{ graph_data | safe if graph_data else 'null'
    }};

    requestAnimationFrame(() => {
        const chartDiv = document.getElementById('active-chart');
        if (chartDiv && rawData) {
            // If it's a JSON string from Python's json.dumps, parse it
            const plotData = (typeof rawData === 'string') ? JSON.parse(rawData) : rawData;

            Plotly.newPlot(chartDiv, plotData.data, plotData.layout, {
                responsive: true,
                displaylogo: false,
            });
        }
    });
    }) ();
</script>
