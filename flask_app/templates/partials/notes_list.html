<header class="notes-header">
    <div class="note-filter-wrapper">
        <label for="subject-filter"><small>Filtrar:</small></label>
        <select id="subject-filter" name="subject_filter"
            hx-get="{{ url_for('detalle_vehiculo', patente=vehicle.vehicle_id) }}" hx-target="#notes-list-container"
            hx-trigger="change">
            <option value="ALL">Todos los asuntos</option>
            {% for sub in subjects %}
            <option value="{{ sub.name }}" {% if selected_filter==sub.name %}selected{% endif %}>
                {{ sub.value | capitalize }}
            </option>
            {% endfor %}
        </select>
    </div>
</header>

<div id="notes-scroll-area" class="scroll-area" style="max-height: 500px; overflow-y: auto;">
    {% for note in notes | sort(attribute='created_at', reverse=True) %}
    <div class="note-item">
        <div class="note-meta">
            {# Dynamic class based on Enum Name #}
            <mark class="tag-{{ 'incident' if note.subject.name == 'INCIDENTE' 
                          else 'speed' if note.subject.name == 'EXCESO_VELOCIDAD'
                          else 'maintenance' if note.subject.name == 'MANTENIMIENTO_PROXIMO'
                          else 'delay' if note.subject.name == 'RETRASO_PLANIFICACION'
                          else 'behavior' if note.subject.name == 'COMPORTAMIENTO_CONDUCCION'
                          else 'other' }}">
                {{ note.subject.value }}
            </mark>
            <small>{{ note.created_at | local_time }}</small>
        </div>
        <p>{{ note.comment }}</p>
        <hr>
    </div>
    {% else %}
    <p>No hay anotaciones registradas.</p>
    {% endfor %}
</div>
