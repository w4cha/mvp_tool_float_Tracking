{% for u in found_users %}
<tr class="{{ 'row-moving' if u.active_user else 'row-stopped' }}">
    <td><strong>{{ u.user_name }}</strong></td>
    <td>{{ u.user_email }}</td>
    <td><small>{{ u.user_role.value }}</small></td>
    <td>
        <span class="badge {{ 'badge-success' if u.active_user else 'badge-error' }}">
            {{ 'Activo' if u.active_user else 'Inactivo' }}
        </span>
    </td>
    <td>
        <form action="{{ url_for('admin.delete_user') }}" method="POST" style="margin: 0;">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ u.user_id }}">
            <button type="submit" class="outline {{ 'secondary' if u.active_user else 'primary' }}"
                style="padding: 2px 10px; font-size: 0.75rem; margin: 0;">
                {{ 'Desactivar' if u.active_user else 'Reactivar' }}
            </button>
        </form>
    </td>
</tr>
{% else %}
<tr>
    <td colspan="5" style="text-align: center; color: var(--muted-color);">
        <small>No se encontraron usuarios o inicia una búsqueda.</small>
    </td>
</tr>
{% endfor %}
