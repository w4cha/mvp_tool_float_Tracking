services:
  # --- 1. THE WEB APP (FLASK) ---
  - type: web
    name: fleet-web-app
    runtime: docker
    rootDir: flask_app
    dockerfilePath: Dockerfile
    dockerContext: . 
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db-instance
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      
      # Sensitive variables (Render will prompt you for these)
      - key: SECRET_KEY
        sync: false
      - key: USER_EMAIL
        sync: false
      - key: USER_NAME
        sync: false
      - key: USER_PASSWORD
        sync: false
      - key: WIALON_TOKEN
        sync: false

  # --- 2. THE BACKGROUND WORKER ---
  - type: worker
    name: fleet-telemetry-worker
    runtime: docker
    rootDir: wialon_background_worker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free # Starter is recommended for 24/7 background tasks
    envVars:
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      - key: WIALON_TOKEN
        sync: false

      # Individual DB Vars (Pulled automatically from the DB below)
      - key: DB_USER
        fromDatabase:
          name: fleet-db-instance
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fleet-db-instance
          property: password
      - key: DB_HOST
        fromDatabase:
          name: fleet-db-instance
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fleet-db-instance
          property: database
      - key: DB_PORT
        fromDatabase:
          name: fleet-db-instance
          property: port

# --- 3. THE MANAGED DATABASE ---
databases:
  - name: fleet-db-instance
    databaseName: fleet_db
    user: fleet_admin
    plan: free