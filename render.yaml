services:
  # --- 1. THE WEB APP (FLASK) ---
  - type: web
    name: fleet-web-app
    runtime: docker
    plan: free
    dockerContext: flask_app
    dockerfilePath: Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db-instance
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      # Fill these in the Render Dashboard UI
      - key: SECRET_KEY
        sync: false
      - key: USER_EMAIL
        sync: false
      - key: USER_NAME
        sync: false
      - key: USER_PASSWORD
        sync: false
      - key: WIALON_TOKEN
        sync: false

  # --- 2. THE BACKGROUND WORKER (WIALON) ---
  - type: worker
    name: fleet-telemetry-worker
    runtime: docker
    plan: starter
    dockerContext: wialon_background_worker
    dockerfilePath: Dockerfile
    envVars:
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      - key: WIALON_TOKEN
        sync: false
      # Database connection variables for the worker script
      - key: DB_USER
        fromDatabase:
          name: fleet-db-instance
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fleet-db-instance
          property: password
      - key: DB_HOST
        fromDatabase:
          name: fleet-db-instance
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fleet-db-instance
          property: database
      - key: DB_PORT
        fromDatabase:
          name: fleet-db-instance
          property: port

databases:
  - name: fleet-db-instance
    databaseName: fleet_db
    user: fleet_admin
    plan: free