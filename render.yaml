services:
  # --- 1. THE WEB APP (FLASK) ---
  - type: web
    name: fleet-web-app
    runtime: docker
    plan: free
    # Tells Render to go into the flask_app folder first
    rootDir: flask_app
    # Inside flask_app, find the Dockerfile
    dockerfilePath: Dockerfile
    # Use the flask_app folder as the build environment
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db-instance
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      
      # Sensitive variables (Paste these in the Render Dashboard when prompted)
      - key: SECRET_KEY
        sync: false
      - key: USER_EMAIL
        sync: false
      - key: USER_NAME
        sync: false
      - key: USER_PASSWORD
        sync: false
      - key: WIALON_TOKEN
        sync: false

  # --- 2. THE BACKGROUND WORKER (WIALON POLLING) ---
  - type: worker
    name: fleet-telemetry-worker
    runtime: docker
    plan: starter # Recommended for 24/7 background tasks
    # Tells Render to go into the wialon_background_worker folder first
    rootDir: wialon_background_worker
    # Inside wialon_background_worker, find the Dockerfile
    dockerfilePath: Dockerfile
    # Use the wialon_background_worker folder as the build environment
    dockerContext: .
    envVars:
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      - key: WIALON_TOKEN
        sync: false

      # Database connection variables (Automatically mapped from the DB below)
      - key: DB_USER
        fromDatabase:
          name: fleet-db-instance
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fleet-db-instance
          property: password
      - key: DB_HOST
        fromDatabase:
          name: fleet-db-instance
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fleet-db-instance
          property: database
      - key: DB_PORT
        fromDatabase:
          name: fleet-db-instance
          property: port

# --- 3. THE MANAGED POSTGRES DATABASE ---
databases:
  - name: fleet-db-instance
    databaseName: fleet_db
    user: fleet_admin
    plan: free