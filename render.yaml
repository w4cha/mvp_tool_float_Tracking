services:
  # --- FLASK WEB SERVICE ---
  - type: web
    name: fleet-web
    runtime: docker
    rootDir: flask_app
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      - key: SECRET_KEY
        sync: false # Render will ask you for this in the UI
      - key: USER_EMAIL
        sync: false # Render will ask you for this in the UI
      - key: USER_NAME
        sync: false # Render will ask you for this in the UI
      - key: USER_PASSWORD
        sync: false # Render will ask you for this in the UI
      - key: WIALON_TOKEN
        sync: false # Render will ask you for this in the UI

  # --- BACKGROUND WORKER SERVICE ---
  - type: worker
    name: fleet-worker
    runtime: docker
    rootDir: wialon_background_worker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      - key: WIALON_TOKEN
        sync: false # Render will ask you for this in the UI
      # Individual DB Vars (Pulled automatically from the DB below)
      - key: DB_USER
        fromDatabase:
          name: fleet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fleet-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: fleet-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fleet-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: fleet-db
          property: port

databases:
  - name: fleet-db
    databaseName: fleet_db
    user: fleet_admin
    plan: free