services:
  # --- 1. THE WEB APP ---
  - type: web
    name: fleet-web-app
    runtime: docker
    plan: starter
    # Build from the root; point to the file in the subfolder
    dockerContext: .
    dockerfilePath: flask_app/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db-instance
          property: connectionString
      - key: PYTHONPATH 
        value: /app
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      # Fill these in Render Dashboard
      - key: SECRET_KEY
        sync: false
      - key: WIALON_TOKEN
        sync: false

  # --- 2. THE BACKGROUND WORKER ---
  - type: worker
    name: fleet-telemetry-worker
    runtime: docker
    plan: starter
    # Build from the root; point to the file in the subfolder
    dockerContext: .
    dockerfilePath: wialon_background_worker/Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db-instance
          property: connectionString
      - key: PYTHONPATH 
        value: /app
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      - key: WIALON_TOKEN
        sync: false
      # Link to the SAME database
      - key: DB_USER
        fromDatabase:
          name: fleet-db-instance
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fleet-db-instance
          property: password
      - key: DB_HOST
        fromDatabase:
          name: fleet-db-instance
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fleet-db-instance
          property: database
      - key: DB_PORT
        fromDatabase:
          name: fleet-db-instance
          property: port

databases:
  - name: fleet-db-instance
    databaseName: fleet_db
    user: fleet_user
    plan: starter         
    postgresMajorVersion: 18