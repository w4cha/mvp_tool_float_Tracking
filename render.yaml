services:
  # --- 1. THE WEB APP (FLASK) ---
  - type: web
    name: fleet-web-app
    runtime: docker
    plan: starter        # Updated to $7/mo plan
    rootDir: flask_app
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fleet-db-instance # This links to your existing DB
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      
      # Sensitive variables (Render will prompt for these)
      - key: SECRET_KEY
        sync: false
      - key: USER_EMAIL
        sync: false
      - key: USER_NAME
        sync: false
      - key: USER_PASSWORD
        sync: false
      - key: WIALON_TOKEN
        sync: false

  # --- 2. THE BACKGROUND WORKER ---
  - type: worker
    name: fleet-telemetry-worker
    runtime: docker
    plan: starter        # Updated to $7/mo plan
    region: ohio         # Must match the web app region
    rootDir: wialon_background_worker
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: FLASK_ENV
        value: production
      - key: TZ
        value: America/Santiago
      - key: WIALON_TOKEN
        sync: false

      # Individual DB Vars pulled from your existing fleet-db-instance
      - key: DB_USER
        fromDatabase:
          name: fleet-db-instance
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: fleet-db-instance
          property: password
      - key: DB_HOST
        fromDatabase:
          name: fleet-db-instance
          property: host
      - key: DB_NAME
        fromDatabase:
          name: fleet-db-instance
          property: database
      - key: DB_PORT
        fromDatabase:
          name: fleet-db-instance
          property: port

databases:
  - name: fleet-db-instance
    plan: starter         # The $7/mo DB plan is 'basic'