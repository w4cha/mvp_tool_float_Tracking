services:
  db:
    image: postgres:15-alpine
    container_name: fleet_db
    restart: always
    # No env_file needed if we pass them all here
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./flask_app
    container_name: fleet_web
    restart: always
    environment:
      # Explicitly setting the environment for your config_dict logic
      - FLASK_ENV=production 
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=db
      - DB_PORT=5432
      # Passing the admin credentials for init_db.py
      - USER_NAME=${USER_NAME}
      - USER_EMAIL=${USER_EMAIL}
      - USER_PASSWORD=${USER_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
      - WIALON_TOKEN=${WIALON_TOKEN}
    ports:
      - "5000:5000"
    depends_on:
      - db

  worker:
    build: ./wialon_background_worker
    container_name: wialon_worker
    restart: always
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_HOST=db
      - DB_PORT=5432
      - WIALON_TOKEN=${WIALON_TOKEN}
    depends_on:
      - db

volumes:
  postgres_data: